<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Who's Watching?</title>
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { font-size: 3rem; font-weight: 500; margin-bottom: 2rem; letter-spacing: 1px; }
        
        .profile-gate { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
        .profile-container { text-align: center; cursor: pointer; }
        
        .profile-box {
            width: 130px; height: 130px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-size: 4rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), border 0.3s;
            border: 3px solid transparent;
        }
        
        /* Profile Colors */
        .box-you { background: linear-gradient(45deg, #1f4037, #99f2c8); }
        .box-her { background: linear-gradient(45deg, #f2709c, #ff9472); }
        .box-us { background: linear-gradient(45deg, #e50914, #ff5252); }

        .profile-container:hover .profile-box { border: 3px solid white; transform: scale(1.08); }
        .profile-name { margin-top: 1rem; font-size: 1.2rem; color: #808080; transition: color 0.3s; }
        .profile-container:hover .profile-name { color: white; }
        
        #password-section { display: none; text-align: center; animation: fadeIn 0.5s ease forwards; }
        input {
            padding: 12px 20px; font-size: 1.1rem; background-color: #333;
            border: none; color: white; border-radius: 4px; outline: none;
            width: 260px; text-align: center; box-sizing: border-box;
        }
        input:focus { background-color: #444; box-shadow: 0 0 5px rgba(229, 9, 20, 0.5); }
        button {
            padding: 12px 24px; font-size: 1.1rem; background-color: #e50914; color: white;
            border: none; border-radius: 4px; cursor: pointer; margin-top: 15px;
            font-weight: bold; transition: background 0.2s; width: 260px;
        }
        button:hover { background-color: #f40612; }
        #error-msg { color: #e50914; margin-top: 15px; font-size: 0.95rem; display: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1 id="main-title">Who's watching?</h1>

    <div class="profile-gate" id="profile-gate">
        <div class="profile-container" onclick="showPasswordPort()">
            <div class="profile-box box-you">👦🏻</div>
            <div class="profile-name">You</div>
        </div>
        <div class="profile-container" onclick="showPasswordPort()">
            <div class="profile-box box-her">👩🏻</div>
            <div class="profile-name">Her</div>
        </div>
        <div class="profile-container" onclick="showPasswordPort()">
            <div class="profile-box box-us">❤️</div>
            <div class="profile-name">Us</div>
        </div>
    </div>

    <div id="password-section">
        <input type="password" id="passInput" placeholder="Enter Anniversary Code">
        <br>
        <button onclick="verifyKey()">Unlock Vault</button>
        <p id="error-msg">Incorrect code. Hint: A very special date!</p>
    </div>

    <script>
        function showPasswordPort() {
            document.getElementById('profile-gate').style.display = 'none';
            document.getElementById('main-title').innerText = 'Enter Secret Key';
            document.getElementById('password-section').style.display = 'block';
            document.getElementById('passInput').focus();
        }

        function verifyKey() {
            let password = document.getElementById("passInput").value;
            if(password === "1807") { 
                window.location.href = "vault.html";
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }
        
        document.getElementById("passInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") { verifyKey(); }
        });
    </script>
</body>
</html>
