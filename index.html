<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Who's Watching?</title>
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 500;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }
        .profile-container {
            text-align: center;
            cursor: pointer;
        }
        .profile-box {
            width: 150px;
            height: 150px;
            border-radius: 4px;
            background: linear-gradient(45deg, #e50914, #ff5252);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), border 0.3s;
            border: 3px solid transparent;
        }
        .profile-container:hover .profile-box {
            border: 3px solid white;
            transform: scale(1.08);
        }
        .profile-name {
            margin-top: 1.2rem;
            font-size: 1.3rem;
            color: #808080;
            transition: color 0.3s;
        }
        .profile-container:hover .profile-name {
            color: white;
        }
        #password-section {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease forwards;
        }
        input {
            padding: 12px 20px;
            font-size: 1.1rem;
            background-color: #333;
            border: none;
            color: white;
            border-radius: 4px;
            outline: none;
            width: 260px;
            text-align: center;
            box-sizing: border-box;
        }
        input:focus {
            background-color: #444;
            box-shadow: 0 0 5px rgba(229, 9, 20, 0.5);
        }
        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: background 0.2s;
            width: 260px;
        }
        button:hover {
            background-color: #f40612;
        }
        #error-msg {
            color: #e50914;
            margin-top: 15px;
            font-size: 0.95rem;
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1 id="main-title">Who's watching?</h1>

    <div class="profile-container" id="profile-gate" onclick="showPasswordPort()">
        <div class="profile-box">❤️</div>
        <div class="profile-name">Us</div>
    </div>

    <div id="password-section">
        <input type="password" id="passInput" placeholder="Enter Anniversary Code">
        <br>
        <button onclick="verifyKey()">Unlock Vault</button>
        <p id="error-msg">Incorrect code. Hint: A very special date!</p>
    </div>

    <script>
        function showPasswordPort() {
            document.getElementById('profile-gate').style.display = 'none';
            document.getElementById('main-title').innerText = 'Enter Secret Key';
            document.getElementById('password-section').style.display = 'block';
            document.getElementById('passInput').focus();
        }

        function verifyKey() {
            let password = document.getElementById("passInput").value;
            // CHANGE "1402" TO WHATEVER PASSWORD/DATE YOU WANT
            if(password === "1807") { 
                window.location.href = "vault.html";
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }
        
        // Allow pressing 'Enter' to submit
        document.getElementById("passInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                verifyKey();
            }
        });
    </script>
</body>
</html>
